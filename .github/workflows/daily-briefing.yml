name: Daily Space & Defense-Space Briefing

on:
  schedule:
    # 11:30 UTC, Monday-Friday => ~07:30 ET / ~04:30 PT.
    # Adjust the cron line below to change the schedule.
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    inputs:
      skip_email:
        description: "Generate the deck but don't send the email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      NEWS_PROVIDER: ${{ vars.NEWS_PROVIDER || 'newsapi' }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

      LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '36' }}
      MAX_ARTICLES_PER_TOPIC: ${{ vars.MAX_ARTICLES_PER_TOPIC || '8' }}
      OUTPUT_DIR: output
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Run briefing
        run: |
          if [ "${{ inputs.skip_email }}" = "true" ]; then
            uv run space-news-briefing --skip-email
          else
            uv run space-news-briefing
          fi

      - name: Upload deck artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-deck
          path: output/*.pptx
          if-no-files-found: warn
          retention-days: 14
